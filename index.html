<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Z-CITY RPH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400&family=Syncopate:wght@700&display=swap');

        :root {
            --bg: #030303;
            --fg: #ececec;
            --muted: rgba(180,180,180,0.55);
            --glass: rgba(10,10,12,0.82);
            --line: rgba(255,255,255,0.12);
            --glow: rgba(255,255,255,0.06);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg); color: var(--fg);
            font-family: 'Cormorant Garamond', Georgia, serif;
            cursor: default; user-select: none;
        }

        .viewport {
            position: relative; width: 100%; height: 100%;
            background:
                radial-gradient(ellipse 90% 70% at 50% 35%, #161616 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(255,255,255,0.02) 0%, transparent 50%),
                linear-gradient(180deg, #050505 0%, #000 100%);
            overflow: hidden;
        }

        .layer { position: absolute; inset: 0; pointer-events: none; }

        .sketch-bg {
            z-index: 1; opacity: 0.14;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(255,255,255,0.025) 47px, rgba(255,255,255,0.025) 48px),
                repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(255,255,255,0.018) 47px, rgba(255,255,255,0.018) 48px);
            animation: sketchDrift 22s linear infinite;
        }
        @keyframes sketchDrift { to { transform: translate(-30px, 30px) rotate(0.4deg); } }

        .grid-plane {
            z-index: 2; width: 440%; height: 440%; top: -170%; left: -170%;
            background-image:
                linear-gradient(rgba(255,255,255,0.055) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.055) 1px, transparent 1px);
            background-size: 56px 56px;
            transform: perspective(380px) rotateX(64deg);
            animation: gridMove 6s linear infinite;
            opacity: 0.45;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, #000 20%, transparent 75%);
        }
        @keyframes gridMove { to { background-position: 0 56px; } }

        .horizon-glow {
            z-index: 3; bottom: 0; top: auto; height: 45%;
            background: radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,255,255,0.05) 0%, transparent 65%);
        }

        .wire-ring {
            z-index: 4; display: flex; align-items: center; justify-content: center;
        }
        .wire-ring svg {
            width: min(580px, 82vw); height: min(580px, 82vw);
            opacity: 0.1; animation: ringSpin 60s linear infinite;
        }
        @keyframes ringSpin { to { transform: rotate(360deg); } }

        .pulse-ring {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            animation: pulseExpand 4s ease-out infinite;
        }
        .pulse-ring:nth-child(1) { width: 280px; height: 280px; animation-delay: 0s; }
        .pulse-ring:nth-child(2) { width: 280px; height: 280px; animation-delay: 1.3s; }
        .pulse-ring:nth-child(3) { width: 280px; height: 280px; animation-delay: 2.6s; }
        @keyframes pulseExpand {
            0%   { transform: scale(0.85); opacity: 0.35; }
            100% { transform: scale(1.35); opacity: 0; }
        }

        #particleCanvas { position: absolute; inset: 0; z-index: 5; opacity: 0.5; }

        .film-scratch {
            position: absolute; top: 0; width: 1px; height: 100%; z-index: 100;
            background: rgba(255,255,255,0.07); animation: scratch 5s infinite;
        }
        @keyframes scratch {
            0% { left: 5%; opacity: 0; } 5% { opacity: 0.5; } 10% { left: 12%; opacity: 0; }
            16% { left: 78%; opacity: 0.2; } 20% { opacity: 0; } 100% { left: 95%; opacity: 0; }
        }

        .scanline {
            position: absolute; width: 100%; height: 2px; z-index: 50;
            background: linear-gradient(transparent, rgba(255,255,255,0.05), transparent);
            animation: scan 8s linear infinite;
        }
        @keyframes scan { from { top: -5%; } to { top: 105%; } }

        .noise {
            position: absolute; inset: 0; z-index: 25; opacity: 0.06; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: noiseTick 0.15s steps(2) infinite;
        }
        @keyframes noiseTick { 50% { opacity: 0.09; transform: translate(-1px,1px); } }

        .vignette {
            position: absolute; inset: 0; z-index: 30; pointer-events: none;
            background: radial-gradient(ellipse, transparent 30%, rgba(0,0,0,0.88) 100%);
        }

        .static-burst {
            position: absolute; inset: 0; z-index: 95; pointer-events: none;
            background: rgba(255,255,255,0.03); opacity: 0;
            animation: burst 9s infinite;
        }
        @keyframes burst {
            0%,91%,100% { opacity: 0; } 92% { opacity: 0.12; } 93% { opacity: 0; } 96% { opacity: 0.06; }
        }

        .glitch-bar {
            position: absolute; left: 0; width: 100%; z-index: 90;
            background: rgba(255,255,255,0.05); opacity: 0; pointer-events: none;
        }

        .hud-frame {
            position: absolute; inset: 18px; z-index: 40; pointer-events: none;
        }
        .hud-bracket {
            position: absolute; width: 32px; height: 32px;
            border-color: rgba(255,255,255,0.25); border-style: solid; border-width: 0;
            animation: bracketPulse 3s ease-in-out infinite;
        }
        .hud-bracket.tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }
        .hud-bracket.tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }
        .hud-bracket.bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }
        .hud-bracket.br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }
        @keyframes bracketPulse { 0%,100% { opacity: 0.25; } 50% { opacity: 0.55; } }

        .hud-top {
            position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
            z-index: 45; display: flex; align-items: center; gap: 10px;
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            letter-spacing: 0.35em; color: var(--muted); text-transform: uppercase;
        }
        .hud-dot {
            width: 5px; height: 5px; border-radius: 50%; background: #fff;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
            animation: dotBlink 2s ease-in-out infinite;
        }
        @keyframes dotBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

        .hud-side {
            position: absolute; z-index: 44; font-family: 'JetBrains Mono', monospace;
            font-size: 8px; letter-spacing: 0.15em; color: rgba(255,255,255,0.18);
            writing-mode: vertical-rl; text-orientation: mixed;
        }
        .hud-side.left { left: 32px; top: 50%; transform: translateY(-50%); }
        .hud-side.right { right: 32px; top: 50%; transform: translateY(-50%) rotate(180deg); }

        .hud-bottom {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 45; font-family: 'JetBrains Mono', monospace; font-size: 8px;
            letter-spacing: 0.2em; color: rgba(255,255,255,0.2);
        }

        .center-stack {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20; width: min(720px, 90vw);
            display: flex; flex-direction: column; align-items: center; gap: 36px;
            text-align: center;
        }

        .logo-block { position: relative; display: flex; align-items: center; justify-content: center; }

        .logo-container {
            position: relative; z-index: 2;
            animation: logoFloat 8s ease-in-out infinite;
            transition: transform 1.6s cubic-bezier(0.68,-0.55,0.27,1.55), opacity 1.2s ease;
        }
        .logo-container.fly-up { transform: translateY(-160%) scale(0.4); opacity: 0; }
        @keyframes logoFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .logo {
            font-family: 'Cinzel', 'Syncopate', serif;
            font-size: clamp(42px, 8.5vw, 96px);
            font-weight: 700;
            letter-spacing: clamp(8px, 1.8vw, 20px);
            color: #fafafa;
            text-shadow: 0 0 30px rgba(255,255,255,0.15), 0 0 60px rgba(255,255,255,0.05);
            position: relative; white-space: nowrap;
        }
        .logo-line {
            display: block; width: min(200px, 40vw); height: 1px; margin: 14px auto 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.45), transparent);
        }
        .logo-shine {
            position: relative; overflow: hidden;
        }
        .logo-shine::after {
            content: ''; position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
            animation: shine 5s ease-in-out infinite;
        }
        @keyframes shine { 0%,100% { left: -120%; } 45% { left: 160%; } }

        .logo::before, .logo::after {
            content: "Z-CITY RPH"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .logo::before {
            clip-path: inset(0 0 52% 0);
            text-shadow: -2px 0 rgba(200,200,200,0.3);
            animation: glitchA 6s infinite linear alternate-reverse;
        }
        .logo::after {
            clip-path: inset(48% 0 0 0);
            text-shadow: 2px 0 rgba(140,140,140,0.35);
            animation: glitchB 5s infinite linear alternate-reverse;
        }
        @keyframes glitchA {
            0%,100% { transform: translate(0); }
            7% { transform: translate(-4px,1px); } 8% { transform: translate(2px,-1px); } 9% { transform: translate(0); }
        }
        @keyframes glitchB {
            0%,100% { transform: translate(0); }
            14% { transform: translate(3px,0); } 15% { transform: translate(-2px,1px); } 16% { transform: translate(0); }
        }

        .glass-card {
            position: relative; width: 100%;
            padding: 26px 32px 24px;
            background: linear-gradient(145deg, rgba(14,14,16,0.92), rgba(6,6,8,0.88));
            border: 1px solid var(--line);
            box-shadow: 0 0 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .glass-card::before {
            content: ''; position: absolute; inset: -1px; z-index: -1;
            background: conic-gradient(from var(--border-angle, 0deg), transparent, rgba(255,255,255,0.15), transparent, rgba(255,255,255,0.08), transparent);
            animation: borderSpin 8s linear infinite;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude; padding: 1px;
        }
        @property --border-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
        @keyframes borderSpin { to { --border-angle: 360deg; } }
        .glass-card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .card-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px; letter-spacing: 0.4em; color: rgba(200,200,200,0.4);
            text-transform: uppercase; margin-bottom: 14px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .card-tag::before, .card-tag::after {
            content: ''; flex: 1; max-width: 40px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15));
        }
        .card-tag::after { transform: scaleX(-1); }

        .phrase-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(16px, 2vw, 20px); font-weight: 300; font-style: italic;
            line-height: 1.65; color: rgba(210,210,210,0.92);
            min-height: 3em; transition: opacity 0.7s ease, transform 0.7s ease;
        }
        .phrase-text.fade-out { opacity: 0; transform: translateY(8px); }

        .phrase-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px; letter-spacing: 0.25em; color: rgba(255,255,255,0.2);
            margin-top: 16px;
        }

        .phrase-panel { width: 100%; }

        .crosshair {
            position: absolute; z-index: 8; opacity: 0.06; pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: #fff;
        }
        .crosshair::before { width: 1px; height: 100%; left: 50%; }
        .crosshair::after { height: 1px; width: 100%; top: 50%; }
        .crosshair-a { top: 20%; left: 10%; width: 36px; height: 36px; }
        .crosshair-b { bottom: 24%; right: 12%; width: 24px; height: 24px; }

        .load-panel { display: none !important; }
    </style>
</head>
<body>
    <div class="film-scratch"></div>
    <div class="scanline"></div>
    <div class="noise"></div>
    <div class="static-burst"></div>
    <div class="vignette"></div>
    <div class="glitch-bar" id="glitchBar"></div>

    <div class="hud-frame">
        <div class="hud-bracket tl"></div>
        <div class="hud-bracket tr"></div>
        <div class="hud-bracket bl"></div>
        <div class="hud-bracket br"></div>
    </div>

    <div class="hud-top"><span class="hud-dot"></span> Z-CITY NET // SECURE CHANNEL</div>
    <div class="hud-side left">PERMADEATH PROTOCOL ACTIVE</div>
    <div class="hud-side right">NEURAL LINK STANDBY</div>
    <div class="hud-bottom" id="hudCoords">X:0000 Y:0000 // SYNC</div>

    <div class="viewport">
        <div class="layer sketch-bg" data-depth="0.012"></div>
        <div class="layer grid-plane" data-depth="0.04"></div>
        <div class="layer horizon-glow" data-depth="0.025"></div>

        <div class="layer wire-ring" data-depth="0.02">
            <svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="88" stroke="white" stroke-width="0.4" stroke-dasharray="3 9"/><circle cx="100" cy="100" r="68" stroke="white" stroke-width="0.25" stroke-dasharray="2 14"/><line x1="100" y1="8" x2="100" y2="192" stroke="white" stroke-width="0.15" opacity="0.4"/><line x1="8" y1="100" x2="192" y2="100" stroke="white" stroke-width="0.15" opacity="0.4"/></svg>
        </div>

        <canvas id="particleCanvas"></canvas>
        <div class="crosshair crosshair-a" data-depth="0.05"></div>
        <div class="crosshair crosshair-b" data-depth="0.035"></div>

        <div class="center-stack">
            <div class="logo-block">
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="pulse-ring"></div>
                <div class="logo-container" id="logo">
                    <div class="logo-shine"><h1 class="logo">Z-CITY RPH</h1></div>
                    <div class="logo-line"></div>
                </div>
            </div>

            <div class="phrase-panel glass-card" id="phrasePanel">
                <div class="card-tag">Системное предупреждение</div>
                <div class="phrase-text" id="phraseText"></div>
                <div class="phrase-num" id="phraseNum">01 / 10</div>
            </div>
        </div>

        <div class="load-panel" id="loadPanel" style="display:none"></div>
    </div>

    <script>
        var filesTotal = 0, filesNeeded = 0;
        var mouseX = 0.5, mouseY = 0.5, smoothX = 0.5, smoothY = 0.5;

        var PHRASES = [
            "Смерть здесь необратима. Ваш персонаж перестаёт существовать — навсегда.",
            "Новая жизнь — другой человек: другое имя, другая одежда, другая история.",
            "Каждое решение имеет последствия. Думайте, прежде чем нажать на курок.",
            "Город не прощает импульсивных поступков. Ответственность — только ваша.",
            "Permadeath — не откат. Это конец. Без исключений.",
            "Всё, что вы построили, может исчезнуть за секунду.",
            "Не играйте с чужими жизнями. Здесь это стоит всего.",
            "Один необдуманный шаг — и персонаж станет чужой памятью.",
            "Вы несёте полную ответственность за судьбу того, кем играете.",
            "Z-City не даёт вторых шансов. Только последствия."
        ];

        function initParallax() {
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX / innerWidth;
                mouseY = e.clientY / innerHeight;
            });
            var layers = document.querySelectorAll('[data-depth]');
            (function tick() {
                smoothX += (mouseX - 0.5 - (smoothX - 0.5)) * 0.05;
                smoothY += (mouseY - 0.5 - (smoothY - 0.5)) * 0.05;
                for (var i = 0; i < layers.length; i++) {
                    var d = parseFloat(layers[i].getAttribute('data-depth')) || 0.03;
                    layers[i].style.transform = 'translate3d(' + ((smoothX-0.5)*d*innerWidth) + 'px,' + ((smoothY-0.5)*d*innerHeight) + 'px,0)';
                }
                requestAnimationFrame(tick);
            })();
        }

        function initParticles() {
            var c = document.getElementById('particleCanvas'), ctx = c.getContext('2d'), pts = [];
            function resize() { c.width = innerWidth; c.height = innerHeight; }
            resize(); addEventListener('resize', resize);
            for (var i = 0; i < 90; i++) pts.push({ x: Math.random()*c.width, y: Math.random()*c.height, z: Math.random(), s: Math.random()*1.4+0.2, vx: (Math.random()-0.5)*0.12, vy: -Math.random()*0.2-0.04 });
            (function draw() {
                ctx.clearRect(0,0,c.width,c.height);
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    p.x += p.vx + (smoothX-0.5)*p.z*0.5; p.y += p.vy + (smoothY-0.5)*p.z*0.3;
                    if (p.y < -8) { p.y = c.height+8; p.x = Math.random()*c.width; }
                    ctx.fillStyle = 'rgba(255,255,255,' + (0.06+p.z*0.3) + ')';
                    ctx.fillRect(p.x, p.y, p.s, p.s);
                }
                requestAnimationFrame(draw);
            })();
        }

        function initGlitchBars() {
            var bar = document.getElementById('glitchBar');
            setInterval(function() {
                if (Math.random() > 0.7) {
                    bar.style.top = (Math.random()*100)+'%';
                    bar.style.height = (Math.random()*2+1)+'px';
                    bar.style.opacity = '1';
                    setTimeout(function(){ bar.style.opacity='0'; }, 50+Math.random()*70);
                }
            }, 380);
        }

        function initHudTelemetry() {
            var el = document.getElementById('hudCoords');
            setInterval(function() {
                el.textContent = 'X:' + ('0000'+Math.floor(Math.random()*9999)).slice(-4) + ' Y:' + ('0000'+Math.floor(Math.random()*9999)).slice(-4) + ' // SYNC';
            }, 1200);
        }

        function initPhraseRotator() {
            var el = document.getElementById('phraseText'), num = document.getElementById('phraseNum');
            var idx = Math.floor(Math.random() * PHRASES.length);
            el.textContent = PHRASES[idx];
            num.textContent = (idx+1<10?'0':'') + (idx+1) + ' / ' + PHRASES.length;
            setInterval(function() {
                el.classList.add('fade-out');
                setTimeout(function() {
                    idx = (idx+1) % PHRASES.length;
                    el.textContent = PHRASES[idx];
                    num.textContent = (idx+1<10?'0':'') + (idx+1) + ' / ' + PHRASES.length;
                    el.classList.remove('fade-out');
                }, 680);
            }, 5800);
        }

        function setProgress(pct){} function SetStatusChanged(s){} function SetFilesTotal(t){filesTotal=t||0;}
        function SetFilesNeeded(n){filesNeeded=n||0;} function DownloadingFile(f){} function updateFileProgress(){} function GameDetails(){}

        function triggerExit() {
            document.getElementById('logo').classList.add('fly-up');
        }

        initParallax(); initParticles(); initGlitchBars(); initHudTelemetry(); initPhraseRotator();
    </script>
</body>
</html>
