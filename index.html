<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Z-CITY RPH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Exo+2:wght@900&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050000; font-family: 'Exo 2', sans-serif;
        }

        /* Тот самый класс, который мы добавили */
        .logo-container.fly-up {
            transition: transform 1.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            transform: translateY(-200%) scale(0.5);
        }

        /* Эффект старой пленки */
        .film-scratch {
            position: absolute; top: 0; left: 20%; width: 1px; height: 100%;
            background: rgba(255, 255, 255, 0.05); z-index: 100; animation: scratch 3s infinite;
        }
        @keyframes scratch {
            0% { left: 10%; opacity: 0; }
            5% { opacity: 0.5; }
            10% { left: 15%; opacity: 0; }
            15% { left: 80%; opacity: 0.2; }
            20% { opacity: 0; }
        }

        .scanline {
            position: absolute; width: 100%; height: 4px; background: rgba(255, 0, 0, 0.1);
            z-index: 50; top: -10px; animation: scan 6s linear infinite;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .viewport {
            position: relative; width: 100%; height: 100%;
            background: radial-gradient(circle, #2b0000 0%, #000000 80%);
            display: flex; justify-content: center; align-items: center;
        }

        .grid-plane {
            position: absolute; width: 400%; height: 400%; top: -150%; left: -150%;
            background-image: 
                linear-gradient(to right, rgba(255, 0, 0, 0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(400px) rotateX(60deg);
            animation: moveGrid 4s linear infinite, autoParallax 10s ease-in-out infinite;
            z-index: 2;
        }
        @keyframes moveGrid { from { background-position: 0 0; } to { background-position: 0 60px; } }

        .logo-container { position: relative; z-index: 10; animation: logoFloat 6s ease-in-out infinite; }
        .logo {
            font-family: 'Syncopate', sans-serif; font-size: 110px; color: #fff;
            letter-spacing: 15px; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px #ff0000;
            position: relative; margin: 0;
        }
        .logo::after {
            content: "Z-CITY RPH"; position: absolute; top: 0; left: 2px; width: 100%; height: 100%;
            text-shadow: -2px 0 #ff0000; animation: glitch 4s infinite linear alternate-reverse;
        }
        @keyframes glitch {
            0% { clip: rect(42px, 9999px, 44px, 0); }
            10% { clip: rect(85px, 9999px, 2px, 0); }
            15% { clip: rect(0, 0, 0, 0); }
        }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/dust.png'); opacity: 0.15; z-index: 20; }
        .vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.9) 100%); z-index: 21; }
    </style>
</head>
<body>
    <div class="film-scratch"></div>
    <div class="scanline"></div>
    <div class="overlay"></div>
    <div class="vignette"></div>
    <div class="viewport">
        <div class="grid-plane"></div>
        <div class="logo-container">
            <h1 class="logo">Z-CITY RPH</h1>
        </div>
    </div>

    <script>
        // Функция, которую будет вызывать GMod через Lua
        function triggerExit() {
            document.querySelector('.logo-container').classList.add('fly-up');
        }
    </script>
</body>
</html>
