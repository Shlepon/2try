<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Z-CITY RPH // LOADING SCREEN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=IBM+Plex+Sans:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');

        :root {
            --bg-dark: #070709;
            --accent-red: #ff3333;
            --accent-blue: #0066ff;
            --text-main: #f0f0f2;
            --text-muted: rgba(240, 240, 242, 0.4);
            --border-color: rgba(255, 255, 255, 0.05);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg-dark); color: var(--text-main);
            font-family: 'IBM Plex Sans', sans-serif;
            user-select: none; cursor: default;
        }

        /* Фоновая сетка и эффекты */
        .grid-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                              linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 1; pointer-events: none;
            opacity: 0.5;
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 18, 18, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 6px 100%; z-index: 2; pointer-events: none;
        }

        .vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.85) 100%);
            z-index: 3; pointer-events: none;
        }

        /* Контейнер интерфейса */
        .hud-container {
            position: relative; width: 100%; height: 100%;
            padding: 50px; z-index: 10;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        /* Верхняя панель */
        .hud-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px;
        }

        .hud-header .left-meta, .hud-header .right-meta {
            color: var(--text-muted); text-transform: uppercase;
        }

        .hud-header span { color: var(--text-main); font-weight: 600; }

        /* Центр: Логотип и подсказки */
        .hud-center {
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }

        .main-logo {
            font-family: 'Oswald', sans-serif; font-size: 90px; font-weight: 700;
            letter-spacing: 15px; text-transform: uppercase; color: var(--text-main);
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
            animation: logo-flicker 4s infinite;
        }

        .sub-logo {
            font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 8px;
            color: var(--accent-red); text-transform: uppercase; margin-top: -10px; margin-bottom: 40px;
        }

        .tip-box {
            max-width: 600px; min-height: 50px;
            font-size: 14px; font-weight: 300; color: rgba(255,255,255,0.7);
            line-height: 1.6; border-left: 2px solid var(--accent-red);
            padding-left: 20px; text-align: left; transition: opacity 0.4s ease;
        }

        /* Нижняя панель: Прогресс бар */
        .hud-footer {
            display: flex; flex-direction: column; gap: 15px;
        }

        .status-wrapper {
            display: flex; justify-content: space-between;
            font-family: 'JetBrains Mono', monospace; font-size: 11px;
            text-transform: uppercase; color: var(--text-muted);
        }

        .current-status { color: var(--text-main); font-weight: 400; }

        .progress-bar-container {
            width: 100%; height: 4px; background: rgba(255,255,255,0.03);
            position: relative; border-radius: 2px; overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%; width: 0%; background: var(--text-main);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            transition: width 0.2s ease-out;
        }

        @keyframes logo-flicker {
            0%, 100% { opacity: 1; }
            41% { opacity: 1; }
            42% { opacity: 0.85; }
            43% { opacity: 1; }
            88% { opacity: 1; }
            89% { opacity: 0.9; }
            90% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="grid-overlay"></div>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="hud-container">
        <div class="hud-header">
            <div class="left-meta">
                SYS: <span id="protocol">SECURE FEED</span><br>
                LOC: <span id="map-name">LOADING MAP...</span>
            </div>
            <div class="right-meta" style="text-align: right;">
                SIGNAL: <span style="color: #22c55e;">ONLINE</span><br>
                EST. TIME: <span>VARIABLE</span>
            </div>
        </div>

        <div class="hud-center">
            <div class="main-logo">Z-City</div>
            <div class="sub-logo">Tactical Roleplay Project</div>
            <div class="tip-box" id="tip-text">Инициализация систем безопасности...</div>
        </div>

        <div class="hud-footer">
            <div class="status-wrapper">
                <div class="current-status" id="status-text">Ожидание ответа от сервера...</div>
                <div class="progress-pct" id="pct-text">0%</div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Динамическая ротация подсказок
        const tips = [
            "Смерть на улицах Z-City — это необратимая потеря вашей текущей личности. Тщательно взвешивайте риски.",
            "Камеры AXON записывают все правонарушения. Попытка скрыться от SWAT приведет к объявлению плана перехвата.",
            "Не доверяйте темноте переулков. В темных зонах полиция реагирует на вызовы значительно медленнее.",
            "Поддерживайте связь с фракцией. Одиночки без прикрытия быстро становятся целями для местных банд.",
            "Уважайте правила ролевой игры. Каждое ваше действие формирует историю этого города."
        ];

        let currentTipIndex = 0;
        const tipElement = document.getElementById("tip-text");

        setInterval(() => {
            tipElement.style.opacity = 0;
            setTimeout(() => {
                currentTipIndex = (currentTipIndex + 1) % tips.length;
                tipElement.innerText = tips[currentTipIndex];
                tipElement.style.opacity = 1;
            }, 400);
        }, 7000);

        // Интеграция с движком Garry's Mod
        let totalFiles = 100;
        let filesNeeded = 0;

        function SetStatusChanged(status) {
            document.getElementById("status-text").innerText = status;
        }

        function SetFilesTotal(total) {
            totalFiles = Math.max(total, 1);
        }

        function SetFilesNeeded(needed) {
            filesNeeded = Math.max(needed, 0);
            updateProgress();
        }

        function DownloadingFile(fileName) {
            document.getElementById("status-text").innerText = "Загрузка: " + fileName;
        }

        function GameDetails(serverName, mapName, maxPlayers, gamemode) {
            document.getElementById("map-name").innerText = mapName;
        }

        function updateProgress() {
            let downloaded = totalFiles - filesNeeded;
            let pct = Math.floor((downloaded / totalFiles) * 100);
            pct = Math.min(Math.max(pct, 0), 100);

            document.getElementById("progress-fill").style.width = pct + "%";
            document.getElementById("pct-text").innerText = pct + "%";
        }
    </script>
</body>
</html>
