<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Z-CITY RPH</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap');

        :root {
            --bg: #030303;
            --fg: #ececec;
            --muted: rgba(180,180,180,0.55);
            --line: rgba(255,255,255,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: var(--bg); color: var(--fg);
            font-family: 'IBM Plex Sans', sans-serif;
            cursor: default; user-select: none;
        }

        .police-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 14;
            background: #000;
            pointer-events: none;
            transition: opacity 1.5s ease;
        }
        .police-bg.exit-fade { opacity: 0; }

        .police-flash {
            position: absolute; inset: 0;
            opacity: 0;
            transition: opacity 0.45s ease;
        }
        .police-flash.on { opacity: 1; }

        .police-flash-red.on {
            background: rgba(180, 20, 20, 0.5);
        }
        .police-flash-blue.on {
            background: rgba(20, 55, 200, 0.5);
        }

        #bgGridCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 13;
            pointer-events: none;
        }

        #bgGridSvg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 12;
            pointer-events: none;
        }

        .viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            background: transparent;
            overflow: hidden;
        }

        .layer { position: absolute; inset: 0; pointer-events: none; }

        .center-glow {
            z-index: 0;
            background:
                radial-gradient(circle at 50% 46%, rgba(255,255,255,0.14) 0%, transparent 30%),
                radial-gradient(circle at 50% 46%, rgba(200,200,200,0.06) 0%, transparent 48%);
            animation: centerPulse 6s ease-in-out infinite;
        }
        @keyframes centerPulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .bg-beams {
            z-index: 1; opacity: 0.22;
            background:
                linear-gradient(90deg, transparent 0%, transparent 18%, rgba(255,255,255,0.05) 24%, transparent 30%, transparent 48%, rgba(255,255,255,0.04) 52%, transparent 58%, transparent 76%, rgba(255,255,255,0.035) 82%, transparent 88%);
        }

        .parallax-wrap { position: absolute; inset: 0; pointer-events: none; will-change: transform; }

        .sketch-bg {
            z-index: 2; opacity: 0.28;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(255,255,255,0.04) 47px, rgba(255,255,255,0.04) 48px),
                repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(255,255,255,0.03) 47px, rgba(255,255,255,0.03) 48px);
            animation: sketchDrift 22s linear infinite;
        }
        @keyframes sketchDrift { to { background-position: -24px 24px; } }

        .grid-wrap {
            z-index: 3; overflow: hidden;
        }
        .grid-plane {
            width: 500%; height: 500%; top: -200%; left: -200%;
            background-image:
                linear-gradient(rgba(255,255,255,0.32) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.32) 1px, transparent 1px);
            background-size: 48px 48px;
            transform: perspective(500px) rotateX(68deg);
            transform-origin: 50% 0%;
            animation: gridMove 4s linear infinite;
            opacity: 1;
        }
        @keyframes gridMove { to { background-position: 0 48px; } }

        .grid-vignette {
            z-index: 4;
            background: radial-gradient(ellipse 68% 52% at 50% 58%, transparent 8%, rgba(0,0,0,0.75) 68%);
        }

        .horizon-glow {
            z-index: 5; bottom: 0; top: auto; height: 55%;
            background:
                radial-gradient(ellipse 90% 70% at 50% 100%, rgba(255,255,255,0.12) 0%, transparent 62%),
                linear-gradient(0deg, rgba(255,255,255,0.05) 0%, transparent 35%);
        }

        .wire-ring {
            z-index: 6; display: flex; align-items: center; justify-content: center;
        }
        .wire-ring svg {
            width: min(680px, 92vw); height: min(680px, 92vw);
            opacity: 0.22; animation: ringSpin 60s linear infinite;
        }
        .wire-ring.ring-inner svg {
            width: min(420px, 58vw); height: min(420px, 58vw);
            opacity: 0.16; animation: ringSpinRev 45s linear infinite;
        }
        @keyframes ringSpin { to { transform: rotate(360deg); } }
        @keyframes ringSpinRev { to { transform: rotate(-360deg); } }

        #particleCanvas { position: absolute; inset: 0; z-index: 7; opacity: 0.75; }

        .film-scratch {
            position: fixed; top: 0; width: 1px; height: 100%; z-index: 100;
            background: rgba(255,255,255,0.06); animation: scratch 5s infinite;
        }
        @keyframes scratch {
            0% { left: 5%; opacity: 0; } 5% { opacity: 0.4; } 10% { left: 12%; opacity: 0; }
            16% { left: 78%; opacity: 0.2; } 20% { opacity: 0; } 100% { left: 95%; opacity: 0; }
        }

        .scanline {
            position: fixed; width: 100%; height: 2px; z-index: 50;
            background: linear-gradient(transparent, rgba(255,255,255,0.04), transparent);
            animation: scan 8s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: -5%; } to { top: 105%; } }

        .noise {
            position: fixed; inset: 0; z-index: 15; opacity: 0.06; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            animation: noiseTick 0.15s steps(2) infinite;
        }
        @keyframes noiseTick { 50% { opacity: 0.08; } }

        .vignette {
            position: fixed; inset: 0; z-index: 18; pointer-events: none;
            background: radial-gradient(ellipse, transparent 32%, rgba(0,0,0,0.55) 100%);
        }

        .glitch-bar {
            position: fixed; left: 0; width: 100%; z-index: 90;
            background: rgba(255,255,255,0.04); opacity: 0; pointer-events: none;
        }

        @keyframes revealIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes revealFade {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .reveal {
            opacity: 0;
            animation: revealIn 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .reveal-fade {
            opacity: 0;
            animation: revealFade 0.65s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .reveal-d1 { animation-delay: 0.08s; }
        .reveal-d2 { animation-delay: 0.16s; }
        .reveal-d3 { animation-delay: 0.24s; }
        .reveal-d4 { animation-delay: 0.32s; }
        .reveal-d5 { animation-delay: 0.4s; }

        .hud-frame { position: fixed; inset: 18px; z-index: 40; pointer-events: none; }
        .hud-bracket {
            position: absolute; width: 28px; height: 28px;
            border-color: rgba(255,255,255,0.22); border-style: solid; border-width: 0;
        }
        .hud-bracket.tl { top: 0; left: 0; border-top-width: 1px; border-left-width: 1px; }
        .hud-bracket.tr { top: 0; right: 0; border-top-width: 1px; border-right-width: 1px; }
        .hud-bracket.bl { bottom: 0; left: 0; border-bottom-width: 1px; border-left-width: 1px; }
        .hud-bracket.br { bottom: 0; right: 0; border-bottom-width: 1px; border-right-width: 1px; }

        .hud-top {
            position: fixed; top: 28px; left: 0; right: 0;
            z-index: 45; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 9px;
            letter-spacing: 0.32em; color: var(--muted); text-transform: uppercase;
        }
        .hud-dot {
            width: 4px; height: 4px; border-radius: 50%; background: #fff;
            animation: dotBlink 2s ease-in-out infinite;
        }
        @keyframes dotBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        .hud-side {
            position: fixed; z-index: 44; font-family: 'JetBrains Mono', monospace;
            font-size: 8px; letter-spacing: 0.14em; color: rgba(255,255,255,0.16);
            writing-mode: vertical-rl;
        }
        .hud-side.left { left: 32px; top: 0; bottom: 0; margin: auto 0; height: 200px; }
        .hud-side.right { right: 32px; top: 0; bottom: 0; margin: auto 0; height: 200px; transform: rotate(180deg); }

        .hud-bottom {
            position: fixed; bottom: 28px; left: 0; right: 0;
            z-index: 45; text-align: center;
            font-family: 'JetBrains Mono', monospace; font-size: 8px;
            letter-spacing: 0.18em; color: rgba(255,255,255,0.18);
        }

        /* ── ЛОГОТИП — центр без transform (GMod CEF) ── */
        .logo-zone {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30;
            text-align: center;
            padding-top: 38vh;
            pointer-events: none;
        }
        body.mode-intro .logo-zone {
            padding-top: 28vh;
        }

        .logo-block {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .pulse-ring {
            position: absolute; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.07);
            animation: pulseExpand 4s ease-out infinite;
            top: 0; left: 0; right: 0; bottom: 0; margin: auto;
        }
        .pulse-ring:nth-child(1) { width: 300px; height: 300px; animation-delay: 0s; }
        .pulse-ring:nth-child(2) { width: 300px; height: 300px; animation-delay: 1.3s; }
        .pulse-ring:nth-child(3) { width: 300px; height: 300px; animation-delay: 2.6s; }
        @keyframes pulseExpand {
            0%   { transform: scale(0.88); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .logo-container {
            position: relative; z-index: 2;
            animation: logoFloat 7s ease-in-out infinite;
            transition: transform 1.4s cubic-bezier(0.68,-0.55,0.27,1.55), opacity 1s ease;
        }
        .logo-container.fly-up { transform: translateY(-140%) scale(0.45); opacity: 0; }
        @keyframes logoFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: clamp(44px, 7.5vw, 88px);
            font-weight: 600;
            letter-spacing: 0.14em;
            color: #fafafa;
            text-shadow: 0 0 40px rgba(255,255,255,0.12);
            position: relative;
            line-height: 1;
            text-align: center;
            display: inline-flex;
            flex-wrap: nowrap;
            justify-content: center;
        }
        .logo-char {
            display: inline-block;
            will-change: transform;
            position: relative;
            z-index: 1;
        }
        .logo-char.space { width: 0.35em; }
        .logo-line {
            width: min(180px, 36vw); height: 1px; margin: 16px auto 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }

        .logo::before, .logo::after { display: none; }

        @keyframes glitchA {
            0%,100% { transform: translate(0); }
            8% { transform: translate(-3px,1px); } 9% { transform: translate(0); }
        }
        @keyframes glitchB {
            0%,100% { transform: translate(0); }
            15% { transform: translate(3px,0); } 16% { transform: translate(0); }
        }

        /* ── Подсказки (загрузка) ── */
        .phrase-zone {
            position: fixed;
            top: calc(50% + 10vh);
            left: 0; right: 0;
            margin: 0 auto;
            z-index: 28;
            width: min(640px, 90vw);
            transition: opacity 0.5s ease;
        }
        .phrase-zone.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .glass-card {
            position: relative; width: 100%;
            padding: 22px 28px 20px;
            background: linear-gradient(145deg, rgba(12,12,14,0.94), rgba(6,6,8,0.9));
            border: 1px solid var(--line);
            box-shadow: 0 0 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
            backdrop-filter: blur(8px);
            text-align: center;
        }
        .glass-card::after {
            content: ''; position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        }

        .card-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px; letter-spacing: 0.38em; color: rgba(200,200,200,0.38);
            text-transform: uppercase; margin-bottom: 12px;
        }

        .phrase-text {
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: clamp(13px, 1.5vw, 15px); font-weight: 300;
            line-height: 1.7; color: rgba(205,205,205,0.9);
            min-height: 2.8em;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .phrase-text.fade-out { opacity: 0; transform: translateY(6px); }

        .phrase-num {
            font-family: 'JetBrains Mono', monospace;
            font-size: 8px; letter-spacing: 0.22em; color: rgba(255,255,255,0.18);
            margin-top: 14px;
        }

        .crosshair {
            position: absolute; z-index: 8; opacity: 0.05; pointer-events: none;
        }
        .crosshair::before, .crosshair::after { content: ''; position: absolute; background: #fff; }
        .crosshair::before { width: 1px; height: 100%; left: 50%; }
        .crosshair::after { height: 1px; width: 100%; top: 50%; }
        .crosshair-a { top: 20%; left: 10%; width: 32px; height: 32px; }
        .crosshair-b { bottom: 24%; right: 12%; width: 22px; height: 22px; }

        .load-panel { display: none !important; }
    </style>
</head>
<body>
    <div class="police-bg" id="policeBg">
        <div class="police-flash police-flash-red on" id="policeRed"></div>
        <div class="police-flash police-flash-blue" id="policeBlue"></div>
    </div>
    <canvas id="bgGridCanvas"></canvas>
    <svg id="bgGridSvg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"></svg>

    <div class="film-scratch"></div>
    <div class="scanline"></div>
    <div class="noise"></div>
    <div class="vignette"></div>
    <div class="glitch-bar" id="glitchBar"></div>

    <div class="hud-frame reveal reveal-d1">
        <div class="hud-bracket tl"></div>
        <div class="hud-bracket tr"></div>
        <div class="hud-bracket bl"></div>
        <div class="hud-bracket br"></div>
    </div>
    <div class="hud-top reveal-fade reveal-d2"><span class="hud-dot"></span> Z-CITY NET // SECURE CHANNEL</div>
    <div class="hud-side left reveal-fade reveal-d3">PERMADEATH PROTOCOL ACTIVE</div>
    <div class="hud-side right reveal-fade reveal-d3">NEURAL LINK STANDBY</div>
    <div class="hud-bottom reveal-fade reveal-d4" id="hudCoords">X:0000 Y:0000 // SYNC</div>

    <div class="viewport">
        <div class="layer center-glow"></div>
        <div class="parallax-wrap" data-depth="0.012"><div class="layer bg-beams"></div></div>
        <div class="parallax-wrap" data-depth="0.022"><div class="layer sketch-bg"></div></div>
        <div class="parallax-wrap grid-wrap" data-depth="0.065">
            <div class="layer grid-plane"></div>
            <div class="layer grid-vignette"></div>
        </div>
        <div class="layer horizon-glow" data-depth="0.038"></div>
        <div class="layer wire-ring" data-depth="0.03">
            <svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="88" stroke="white" stroke-width="0.35" stroke-dasharray="3 9"/><circle cx="100" cy="100" r="68" stroke="white" stroke-width="0.2" stroke-dasharray="2 14"/><circle cx="100" cy="100" r="48" stroke="white" stroke-width="0.15" stroke-dasharray="1 8"/></svg>
        </div>
        <div class="layer wire-ring ring-inner" data-depth="0.042">
            <svg viewBox="0 0 200 200" fill="none"><circle cx="100" cy="100" r="72" stroke="white" stroke-width="0.25" stroke-dasharray="4 12"/></svg>
        </div>
        <canvas id="particleCanvas"></canvas>
        <div class="crosshair crosshair-a" data-depth="0.08"></div>
        <div class="crosshair crosshair-b" data-depth="0.055"></div>
    </div>

    <div class="logo-zone" id="logoZone">
        <div class="logo-block">
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="logo-container" id="logo">
                <div class="logo" id="logoText">Z-CITY RPH</div>
                <div class="logo-line"></div>
            </div>
        </div>
    </div>

    <div class="phrase-zone" id="phrasePanel">
        <div class="glass-card reveal reveal-d4">
            <div class="card-tag">// Системное предупреждение</div>
            <div class="phrase-text" id="phraseText"></div>
            <div class="phrase-num" id="phraseNum">01 / 10</div>
        </div>
    </div>

    <div class="load-panel" id="loadPanel" style="display:none"></div>

    <script>
        var filesTotal = 0, filesNeeded = 0;
        var mouseX = 0.5, mouseY = 0.5, smoothX = 0.5, smoothY = 0.5;
        var LOGO_MAGNET_DELAY = 1000;
        var logoChars = [];
        var logoMagnetReady = false;
        var logoMagnetStart = Date.now();

        function initBgGridSvg() {
            var svg = document.getElementById('bgGridSvg');
            if (!svg) return;
            function rebuild() {
                var w = window.innerWidth || 800, h = window.innerHeight || 600;
                svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
                svg.innerHTML = '';
                var horizon = h * 0.36, ns = 'http://www.w3.org/2000/svg';
                for (var r = 0; r <= 22; r++) {
                    var t = r / 22, y = horizon + (h - horizon) * t * t;
                    var half = (w * 0.52) * (0.15 + t * 1.1);
                    var line = document.createElementNS(ns, 'line');
                    line.setAttribute('x1', w * 0.5 - half); line.setAttribute('y1', y);
                    line.setAttribute('x2', w * 0.5 + half); line.setAttribute('y2', y);
                    line.setAttribute('stroke', 'rgba(255,255,255,0.38)'); line.setAttribute('stroke-width', '1');
                    svg.appendChild(line);
                }
                for (var col = -18; col <= 18; col++) {
                    var line = document.createElementNS(ns, 'line');
                    line.setAttribute('x1', w * 0.5 + col * 14); line.setAttribute('y1', horizon);
                    line.setAttribute('x2', w * 0.5 + col * 110); line.setAttribute('y2', h + 20);
                    line.setAttribute('stroke', 'rgba(255,255,255,0.32)'); line.setAttribute('stroke-width', '1');
                    svg.appendChild(line);
                }
            }
            rebuild();
            if (window.addEventListener) window.addEventListener('resize', rebuild);
        }

        function initBgGrid() {
            var c = document.getElementById('bgGridCanvas');
            if (!c) return;
            var ctx = c.getContext('2d');
            var offset = 0;

            function resize() {
                c.width = window.innerWidth || document.documentElement.clientWidth;
                c.height = window.innerHeight || document.documentElement.clientHeight;
            }

            function draw() {
                var w = c.width, h = c.height;
                if (w < 10 || h < 10) { requestAnimationFrame(draw); return; }
                ctx.clearRect(0, 0, w, h);
                var horizon = h * 0.36;
                ctx.strokeStyle = 'rgba(255,255,255,0.28)';
                ctx.lineWidth = 1;

                var rows = 22;
                for (var r = 0; r <= rows; r++) {
                    var t = r / rows;
                    var y = horizon + (h - horizon) * t * t;
                    var half = (w * 0.52) * (0.15 + t * 1.1);
                    ctx.beginPath();
                    ctx.moveTo(w * 0.5 - half, y);
                    ctx.lineTo(w * 0.5 + half, y);
                    ctx.stroke();
                }

                var cols = 18;
                for (var col = -cols; col <= cols; col++) {
                    ctx.beginPath();
                    ctx.moveTo(w * 0.5 + col * 14, horizon);
                    ctx.lineTo(w * 0.5 + col * 110, h + 20);
                    ctx.stroke();
                }

                offset = (offset + 0.6) % 48;
                requestAnimationFrame(draw);
            }

            resize();
            if (window.addEventListener) window.addEventListener('resize', resize);
            draw();
        }

        function initLogoLetters() {
            var logo = document.getElementById('logoText');
            if (!logo) return;
            var text = logo.textContent.trim();
            logo.textContent = '';
            for (var i = 0; i < text.length; i++) {
                var ch = document.createElement('span');
                ch.className = 'logo-char' + (text[i] === ' ' ? ' space' : '');
                ch.textContent = text[i] === ' ' ? '\u00A0' : text[i];
                ch._ox = 0; ch._oy = 0;
                logo.appendChild(ch);
                logoChars.push(ch);
            }
        }

        function tickLogoMagnet() {
            if (Date.now() - logoMagnetStart >= LOGO_MAGNET_DELAY) {
                logoMagnetReady = true;
            }
            if (logoMagnetReady && logoChars.length) {
                var mx = smoothX * innerWidth;
                var my = smoothY * innerHeight;
                var maxDist = 360;
                var pull = 0.2;
                for (var i = 0; i < logoChars.length; i++) {
                    var ch = logoChars[i];
                    if (ch.classList.contains('space')) continue;
                    var rect = ch.getBoundingClientRect();
                    var cx = rect.left + rect.width * 0.5;
                    var cy = rect.top + rect.height * 0.5;
                    var dx = mx - cx;
                    var dy = my - cy;
                    var dist = Math.sqrt(dx * dx + dy * dy);
                    var t = Math.max(0, 1 - dist / maxDist);
                    t = t * t * (3 - 2 * t);
                    var tx = dx * t * pull;
                    var ty = dy * t * pull;
                    ch._ox += (tx - ch._ox) * 0.11;
                    ch._oy += (ty - ch._oy) * 0.11;
                    ch.style.transform = 'translate(' + ch._ox.toFixed(2) + 'px,' + ch._oy.toFixed(2) + 'px)';
                }
            }
            requestAnimationFrame(tickLogoMagnet);
        }

        function initPoliceLights() {
            var red = document.getElementById('policeRed');
            var blue = document.getElementById('policeBlue');
            var showRed = true;
            setInterval(function() {
                showRed = !showRed;
                if (showRed) {
                    red.classList.add('on'); blue.classList.remove('on');
                } else {
                    red.classList.remove('on'); blue.classList.add('on');
                }
            }, 600);
        }

        function initParallax() {
            document.addEventListener('mousemove', function(e) {
                mouseX = e.clientX / innerWidth;
                mouseY = e.clientY / innerHeight;
            });
            var layers = document.querySelectorAll('[data-depth]');
            (function tick() {
                smoothX += (mouseX - smoothX) * 0.07;
                smoothY += (mouseY - smoothY) * 0.07;
                var dx = (smoothX - 0.5) * innerWidth;
                var dy = (smoothY - 0.5) * innerHeight;
                for (var i = 0; i < layers.length; i++) {
                    var d = parseFloat(layers[i].getAttribute('data-depth')) || 0.03;
                    layers[i].style.transform = 'translate3d(' + (dx * d) + 'px,' + (dy * d) + 'px,0)';
                }
                requestAnimationFrame(tick);
            })();
        }

        var PHRASES = [
            "Смерть здесь необратима. Ваш персонаж перестаёт существовать — навсегда.",
            "Новая жизнь — другой человек: другое имя, другая одежда, другая история.",
            "Каждое решение имеет последствия. Думайте, прежде чем нажать на курок.",
            "Город не прощает импульсивных поступков. Ответственность — только ваша.",
            "Permadeath — не откат. Это конец. Без исключений.",
            "Всё, что вы построили, может исчезнуть за секунду.",
            "Не играйте с чужими жизнями. Здесь это стоит всего.",
            "Один необдуманный шаг — и персонаж станет чужой памятью.",
            "Вы несёте полную ответственность за судьбу того, кем играете.",
            "Z-City не даёт вторых шансов. Только последствия."
        ];

        function initParticles() {
            var c = document.getElementById('particleCanvas'), ctx = c.getContext('2d'), pts = [];
            function resize() { c.width = innerWidth; c.height = innerHeight; }
            resize(); addEventListener('resize', resize);
            for (var i = 0; i < 130; i++) pts.push({ x: Math.random()*c.width, y: Math.random()*c.height, z: Math.random(), s: Math.random()*1.6+0.25, vx: (Math.random()-0.5)*0.12, vy: -Math.random()*0.22-0.05 });
            (function draw() {
                ctx.clearRect(0,0,c.width,c.height);
                for (var i = 0; i < pts.length; i++) {
                    var p = pts[i];
                    p.x += p.vx + (smoothX-0.5)*p.z*0.45; p.y += p.vy + (smoothY-0.5)*p.z*0.28;
                    if (p.y < -8) { p.y = c.height+8; p.x = Math.random()*c.width; }
                    ctx.fillStyle = 'rgba(255,255,255,' + (0.05+p.z*0.28) + ')';
                    ctx.fillRect(p.x, p.y, p.s, p.s);
                }
                requestAnimationFrame(draw);
            })();
        }

        function initGlitchBars() {
            var bar = document.getElementById('glitchBar');
            setInterval(function() {
                if (Math.random() > 0.68) {
                    bar.style.top = (Math.random()*100)+'%';
                    bar.style.height = (Math.random()*2+1)+'px';
                    bar.style.opacity = '1';
                    setTimeout(function(){ bar.style.opacity='0'; }, 45+Math.random()*60);
                }
            }, 360);
        }

        function initHudTelemetry() {
            var el = document.getElementById('hudCoords');
            setInterval(function() {
                el.textContent = 'X:' + ('0000'+Math.floor(Math.random()*9999)).slice(-4) + ' Y:' + ('0000'+Math.floor(Math.random()*9999)).slice(-4) + ' // SYNC';
            }, 1100);
        }

        function initPhraseRotator() {
            var el = document.getElementById('phraseText'), num = document.getElementById('phraseNum');
            var idx = Math.floor(Math.random() * PHRASES.length);
            el.textContent = PHRASES[idx];
            num.textContent = (idx+1<10?'0':'') + (idx+1) + ' / ' + PHRASES.length;
            setInterval(function() {
                el.classList.add('fade-out');
                setTimeout(function() {
                    idx = (idx+1) % PHRASES.length;
                    el.textContent = PHRASES[idx];
                    num.textContent = (idx+1<10?'0':'') + (idx+1) + ' / ' + PHRASES.length;
                    el.classList.remove('fade-out');
                }, 600);
            }, 5600);
        }

        function triggerExit() {
            document.getElementById('logo').classList.add('fly-up');
            var policeBg = document.getElementById('policeBg');
            if (policeBg) policeBg.classList.add('exit-fade');
            var grid = document.getElementById('bgGridCanvas');
            if (grid) { grid.style.transition = 'opacity 1.5s ease'; grid.style.opacity = '0'; }
            var viewport = document.querySelector('.viewport');
            if (viewport) {
                viewport.style.transition = 'opacity 1.5s ease';
                viewport.style.opacity = '0';
            }
        }

        function setProgress(pct){} function SetStatusChanged(s){} function SetFilesTotal(t){filesTotal=t||0;}
        function SetFilesNeeded(n){filesNeeded=n||0;} function DownloadingFile(f){} function updateFileProgress(){} function GameDetails(){}

        initLogoLetters();
        initBgGridSvg();
        initBgGrid();
        initPoliceLights();
        initParallax(); initParticles(); initGlitchBars(); initHudTelemetry(); initPhraseRotator();
        tickLogoMagnet();
    </script>
</body>
</html>
